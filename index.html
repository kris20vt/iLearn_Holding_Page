<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iLearn: Next Gen</title>
    <style>
        body {
            background-color: #1a0830;
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            font-family: 'Apex Rounded', 'Segoe UI Rounded', sans-serif;
            overflow-x: hidden;
            perspective: 2000px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .stage {
            text-align: center;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .impact-zone {
            position: relative;
            width: 80vw;
            max-width: 500px; 
            aspect-ratio: 2.3 / 1; 
            margin-bottom: 20px;
            z-index: 1; /* Lowest layer */
            transform-style: preserve-3d;
        }

        .new-logo {
            position: absolute;
            inset: -10%; 
            width: 120%; 
            height: 120%;
            object-fit: contain;
            z-index: 2;
            opacity: 0;
            transform: scale(0.1);
            animation: smashThrough 7s infinite ease-out;
        }

        .shatter-overlay {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            z-index: 3;
            transform-style: preserve-3d;
        }

        .fragment {
            background-image: url('iLearnlogo.PNG');
            background-size: 400% 300%;
            background-repeat: no-repeat;
            animation: gravityFall 7s infinite ease-in;
        }

        .fragment:nth-child(1)  { background-position: 0% 0%; }
        .fragment:nth-child(2)  { background-position: 33.3% 0%; }
        .fragment:nth-child(3)  { background-position: 66.6% 0%; }
        .fragment:nth-child(4)  { background-position: 100% 0%; }
        .fragment:nth-child(5)  { background-position: 0% 50%; }
        .fragment:nth-child(6)  { background-position: 33.3% 50%; }
        .fragment:nth-child(7)  { background-position: 66.6% 50%; }
        .fragment:nth-child(8)  { background-position: 100% 50%; }
        .fragment:nth-child(9)  { background-position: 0% 100%; }
        .fragment:nth-child(10) { background-position: 33.3% 100%; }
        .fragment:nth-child(11) { background-position: 66.6% 100%; }
        .fragment:nth-child(12) { background-position: 100% 100%; }

        /* TEXT SCALING - Z-INDEX SET HIGHER THAN FRAGMENTS */
        .title {
            position: relative;
            z-index: 20; /* High z-index ensures bits fall behind */
            font-size: clamp(2.5rem, 12vw, 7rem);
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            line-height: 1;
        }

        .subtitle {
            position: relative;
            z-index: 20; /* High z-index ensures bits fall behind */
            font-size: clamp(1rem, 4vw, 2rem);
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .video-container {
            position: relative;
            z-index: 30; /* Video stays at the very front */
            width: 100%;
            max-width: 800px;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        @keyframes smashThrough {
            0%, 15% { opacity: 0; transform: scale(0.1) translateZ(0); filter: blur(10px); }
            18% { opacity: 1; transform: scale(1.1) translateZ(100px); filter: blur(0px); } 
            22%, 85% { opacity: 1; transform: scale(1) translateZ(100px); filter: blur(0px); } 
            95%, 100% { opacity: 0; transform: scale(1.1); }
        }

        @keyframes gravityFall {
            0%, 15% { opacity: 1; transform: translate3d(0, 0, 0) rotate(0deg); }
            19% { opacity: 1; transform: translate3d(var(--tx), var(--ty), 50px) rotate(var(--tr)); }
            35%, 90% { 
                opacity: 0; 
                /* -800px Z moves them way into the background behind the text/video */
                transform: translate3d(var(--tx), 1200px, -800px) rotate(calc(var(--tr) * 2)); 
            }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="impact-zone">
            <img src="iLearn LOGO MAIN.png" class="new-logo" alt="New iLearn">
            <div class="shatter-overlay">
                <div class="fragment" style="--tx:-100px; --ty:-50px; --tr:45deg;"></div>
                <div class="fragment" style="--tx:-30px; --ty:-80px; --tr:-30deg;"></div>
                <div class="fragment" style="--tx:30px; --ty:-80px; --tr:20deg;"></div>
                <div class="fragment" style="--tx:100px; --ty:-50px; --tr:-45deg;"></div>
                <div class="fragment" style="--tx:-150px; --ty:20px; --tr:-60deg;"></div>
                <div class="fragment" style="--tx:-50px; --ty:40px; --tr:90deg;"></div>
                <div class="fragment" style="--tx:50px; --ty:40px; --tr:-90deg;"></div>
                <div class="fragment" style="--tx:150px; --ty:20px; --tr:60deg;"></div>
                <div class="fragment" style="--tx:-100px; --ty:100px; --tr:120deg;"></div>
                <div class="fragment" style="--tx:-30px; --ty:120px; --tr:-150deg;"></div>
                <div class="fragment" style="--tx:30px; --ty:120px; --tr:150deg;"></div>
                <div class="fragment" style="--tx:100px; --ty:100px; --tr:-120deg;"></div>
            </div>
        </div>

        <h1 class="title">Coming Soon</h1>
        <div class="subtitle">Next Generation</div>

        <div class="video-container">
            <div style="padding:56.25% 0 0 0;position:relative;">
                <iframe src="https://player.vimeo.com/video/1180811952?h=dd046e117e&amp;badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" 
                        frameborder="0" 
                        allow="autoplay; fullscreen; picture-in-picture;" 
                        style="position:absolute;top:0;left:0;width:100%;height:100%;" 
                        title="iLearn Launch Video">
                </iframe>
            </div>
            <script src="https://player.vimeo.com/api/player.js"></script>
        </div>
    </div>

</body>
</html>
