<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iLearn: Next Gen</title>
    <style>
        body {
            background-color: #1a0830;
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Apex Rounded', 'Segoe UI Rounded', 'Arial Rounded MT Bold', sans-serif;
            overflow-x: hidden;
            /* Creates the 3D space for the fall */
            perspective: 2000px; 
            padding: 60px 0;
        }

        .stage {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* IMPACT ZONE */
        .impact-zone {
            position: relative;
            width: 600px; 
            height: 300px;
            margin-bottom: 20px;
            z-index: 1; /* Lower z-index so pieces fall behind video */
            transform-style: preserve-3d;
        }

        /* NEW LOGO */
        .new-logo {
            position: absolute;
            inset: -60px; 
            width: calc(100% + 120px); 
            height: calc(100% + 120px);
            object-fit: contain;
            z-index: 2;
            opacity: 0;
            transform: scale(0.1);
            animation: smashThrough 7s infinite ease-out;
        }

        /* OLD LOGO FRAGMENTS */
        .shatter-overlay {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            z-index: 3;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            transform-style: preserve-3d;
        }

        .fragment {
            background-image: url('iLearnlogo.PNG');
            background-size: 600px 300px;
            background-repeat: no-repeat;
            /* Fragments start at z-index 3 but fall to a deeper Z-plane */
            animation: gravityFall 7s infinite ease-in;
        }

        /* VIDEO CONTAINER: High z-index to stay in front */
        .video-container {
            position: relative;
            z-index: 10; /* Higher than the fragments */
            margin-top: 40px;
            width: 90%;
            max-width: 900px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(233, 30, 130, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
        }

        /* ANIMATIONS */
        @keyframes smashThrough {
            0%, 15% { opacity: 0; transform: scale(0.1) translateZ(0); filter: blur(10px); }
            18% { opacity: 1; transform: scale(1.1) translateZ(50px); filter: blur(0px); } 
            22%, 85% { opacity: 1; transform: scale(1) translateZ(50px); filter: blur(0px); } 
            95%, 100% { opacity: 0; transform: scale(1.1); }
        }

        @keyframes gravityFall {
            0%, 15% { 
                opacity: 1; 
                transform: translate3d(0, 0, 0) rotate(0deg); 
            }
            19% { 
                opacity: 1; 
                /* Pop forward slightly on impact */
                transform: translate3d(var(--tx), var(--ty), 100px) rotate(var(--tr)); 
            }
            35%, 90% { 
                opacity: 0; 
                /* Fall down and PUSH BACK into the distance (negative Z) */
                transform: translate3d(var(--tx), 1200px, -500px) rotate(calc(var(--tr) * 3)); 
            }
            100% { opacity: 0; }
        }

        .title {
            font-size: 7.5rem;
            font-weight: 900;
            margin: 10px 0 0;
            text-transform: uppercase;
            line-height: 1;
            z-index: 11; /* Keep text in front */
        }

        .subtitle {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 20px;
            z-index: 11;
        }

    </style>
</head>
<body>

    <div class="stage">
        <div class="impact-zone">
            <img src="iLearn LOGO MAIN.png" class="new-logo" alt="Next Gen">
            <div class="shatter-overlay">
                <div class="fragment" style="background-position: 0 0; --tx:-150px; --ty:-50px; --tr:45deg;"></div>
                <div class="fragment" style="background-position: -150px 0; --tx:-50px; --ty:-80px; --tr:-30deg;"></div>
                <div class="fragment" style="background-position: -300px 0; --tx:50px; --ty:-80px; --tr:20deg;"></div>
                <div class="fragment" style="background-position: -450px 0; --tx:150px; --ty:-50px; --tr:-45deg;"></div>
                <div class="fragment" style="background-position: 0 -100px; --tx:-180px; --ty:20px; --tr:-60deg;"></div>
                <div class="fragment" style="background-position: -150px -100px; --tx:-80px; --ty:40px; --tr:90deg;"></div>
                <div class="fragment" style="background-position: -300px -100px; --tx:80px; --ty:40px; --tr:-90deg;"></div>
                <div class="fragment" style="background-position: -450px -100px; --tx:180px; --ty:20px; --tr:60deg;"></div>
                <div class="fragment" style="background-position: 0 -200px; --tx:-120px; --ty:100px; --tr:120deg;"></div>
                <div class="fragment" style="background-position: -150px -200px; --tx:-40px; --ty:120px; --tr:-150deg;"></div>
                <div class="fragment" style="background-position: -300px -200px; --tx:40px; --ty:120px; --tr:150deg;"></div>
                <div class="fragment" style="background-position: -450px -200px; --tx:120px; --ty:100px; --tr:-120deg;"></div>
            </div>
        </div>

        <h1 class="title">Coming Soon</h1>
        <div class="subtitle">Next Generation</div>

        <div class="video-container">
            <div style="padding:56.25% 0 0 0;position:relative;">
                <iframe src="https://player.vimeo.com/video/1180811952?h=dd046e117e&amp;badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" 
                        frameborder="0" 
                        allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin" 
                        style="position:absolute;top:0;left:0;width:100%;height:100%;" 
                        title="Next Generation iLearn Launch Video">
                </iframe>
            </div>
            <script src="https://player.vimeo.com/api/player.js"></script>
        </div>
    </div>

</body>
</html>
